<div class="squeeze-path-list__item">
    <input name="squeeze-path-list__item[]" type="text" class="squeeze-path-list__input"
        value="{{folder}}" readonly />
    {{#if showRemove}}
    <button name="squeeze_remove_path_button" class="squeeze-path-list__remove button" type="button" title="{{clearTitle}}">{{clearLabel}}</button>
    {{/if}}
</div>
